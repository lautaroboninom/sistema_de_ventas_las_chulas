name: Staging Verify (MySQL)
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure example envs exist (no secrets)
        run: |
          cp -n .env.dev.example .env.dev || true
          cp -n .env.prod.example .env.prod || true

      - name: Compose up (staging)
        run: docker compose -f docker-compose.mysql.staging.yml up -d --build

      - name: Wait for MySQL healthy
        run: |
          for i in {1..60}; do
            if docker compose -f docker-compose.mysql.staging.yml exec -T mysql sh -lc 'mysqladmin ping -h 127.0.0.1 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" --silent'; then
              echo "MySQL healthy"; exit 0; fi
            sleep 5
          done
          echo "MySQL NOT healthy"; docker compose -f docker-compose.mysql.staging.yml ps; exit 1

      - name: Copy verify SQL to container
        run: docker compose -f docker-compose.mysql.staging.yml cp mysql/99_verify_mysql.sql mysql:/tmp/mysql/99_verify_mysql.sql

      - name: DB verify (counts + FK orphans)
        run: docker compose -f docker-compose.mysql.staging.yml exec -T mysql sh -lc 'export MYSQL_PWD=$MYSQL_PASSWORD; mysql -u"$MYSQL_USER" -D "$MYSQL_DATABASE" < /tmp/mysql/99_verify_mysql.sql'

      - name: Health + verify (Makefile)
        run: |
          make staging-health || true
          make staging-verify

      - name: Compose logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.mysql.staging.yml ps
          docker compose -f docker-compose.mysql.staging.yml logs --no-color --tail=200
