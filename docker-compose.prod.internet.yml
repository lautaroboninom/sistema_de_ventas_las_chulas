name: equilux-reparaciones
services:
  reverse-proxy:
    image: traefik:v2.11
    container_name: equilux-traefik
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-proxy"
      - "--certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL:-ops@example.com}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    labels:
      - "traefik.enable=true"
      # Middlewares defined on this container for reuse
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.secure-headers.headers.permissionsPolicy=geolocation=(), microphone=(), camera=(), payment=()"
      - "traefik.http.middlewares.compress.compress=true"
      # API rate limit + request size limit
      - "traefik.http.middlewares.apiratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.apiratelimit.ratelimit.burst=40"
      - "traefik.http.middlewares.apibuffer.buffering.maxRequestBodyBytes=52428800" # 50MB
    restart: unless-stopped
    networks:
      - proxy

  postgres:
    image: postgres:16
    container_name: equilux-reparaciones-postgres
    env_file: .env.prod.internet
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -q"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks:
      - backend

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: equilux-reparaciones-api
    env_file: .env.prod.internet
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings_internet
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "python manage.py migrate --noinput && \
      python manage.py apply_repuestos_schema && \
      gunicorn app.wsgi:application -w 3 -k gthread --threads 8 -b 0.0.0.0:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
      - type: bind
        source: ${REPUESTOS_COSTOS_HOST_DIR:-./repuestos}
        target: /repuestos
        read_only: true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.api-secure.rule=Host(`${PUBLIC_DOMAIN:-reparacionesequilux}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-secure.entrypoints=websecure"
      - "traefik.http.routers.api-secure.tls=true"
      - "traefik.http.routers.api-secure.tls.certresolver=le"
      - "traefik.http.routers.api-secure.middlewares=secure-headers@docker,compress@docker,apiratelimit@docker,apibuffer@docker"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    restart: unless-stopped
    networks:
      - backend
      - proxy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod.internet
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: equilux-reparaciones-web
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      api:
        condition: service_started
    volumes:
      - staticfiles:/static:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.web-secure.rule=Host(`${PUBLIC_DOMAIN:-reparacionesequilux}`) && PathPrefix(`/`)"
      - "traefik.http.routers.web-secure.entrypoints=websecure"
      - "traefik.http.routers.web-secure.tls=true"
      - "traefik.http.routers.web-secure.tls.certresolver=le"
      - "traefik.http.routers.web-secure.middlewares=secure-headers@docker,compress@docker"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    name: traefik-proxy
    driver: bridge
  backend:
    name: backend
    driver: bridge
    internal: true

volumes:
  pg_data:
  staticfiles:
  mediafiles:
  letsencrypt_data:



