version: "3.9"

services:
  reverse-proxy:
    image: traefik:v3.0
    container_name: sepid-traefik
    command: []
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/traefik/traefik.yml:/traefik.yml:ro
      - ./deploy/traefik/acme.json:/letsencrypt/acme.json
    labels:
      - "traefik.enable=true"
      # Middlewares defined on this container for reuse
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.secure-headers.headers.permissionsPolicy=geolocation=(), microphone=(), camera=(), payment=()"
      - "traefik.http.middlewares.compress.compress=true"
      # API rate limit + request size limit
      - "traefik.http.middlewares.apiratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.apiratelimit.ratelimit.burst=40"
      - "traefik.http.middlewares.apibuffer.buffering.maxRequestBodyBytes=52428800" # 50MB
    restart: unless-stopped
    networks:
      - proxy

  db:
    image: postgres:16
    container_name: sepid-db
    env_file: .env.prod
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - db_data:/var/lib/postgresql/data
      - db_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: sepid-api
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings_prod
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "python manage.py migrate --noinput && \
      gunicorn app.wsgi:application -w 3 -k gthread --threads 8 -b 0.0.0.0:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - type: bind
        source: ${QUOTES_HOST_DIR}
        target: /quotes
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-secure.rule=Host(`reparaciones.sepid.com.ar`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-secure.entrypoints=websecure"
      - "traefik.http.routers.api-secure.tls=true"
      - "traefik.http.routers.api-secure.tls.certresolver=le"
      - "traefik.http.routers.api-secure.middlewares=secure-headers@docker,compress@docker,apiratelimit@docker,apibuffer@docker"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    restart: unless-stopped
    networks:
      - backend
      - proxy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: sepid-web
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      api:
        condition: service_started
    volumes:
      - staticfiles:/static:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-secure.rule=Host(`reparaciones.sepid.com.ar`) && PathPrefix(`/`)"
      - "traefik.http.routers.web-secure.entrypoints=websecure"
      - "traefik.http.routers.web-secure.tls=true"
      - "traefik.http.routers.web-secure.tls.certresolver=le"
      - "traefik.http.routers.web-secure.middlewares=secure-headers@docker,compress@docker"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    name: traefik-proxy
    driver: bridge
  backend:
    name: backend
    driver: bridge
    internal: true

volumes:
  db_data:
  db_backups:
  staticfiles:

