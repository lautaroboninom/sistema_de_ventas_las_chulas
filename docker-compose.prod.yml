version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: sepid-mysql
    env_file: .env.prod
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql:/docker-entrypoint-initdb.d:ro
      - ./mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: sepid-api
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings_prod
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      bash -lc "python manage.py migrate --noinput && \
      python manage.py collectstatic --noinput && \
      gunicorn app.wsgi:application -w 3 -k gthread --threads 8 -b 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
    restart: unless-stopped

  web:
    profiles:
      - dev

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: sepid-web
    command: ["nginx", "-g", "daemon off;"]
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - staticfiles:/static:ro
    restart: unless-stopped

  nginx:
    profiles:
      - dev

volumes:
  mysql_data:
  staticfiles:
