name: retailhub

services:
  postgres:
    build:
      context: .
      dockerfile: deploy/postgres/Dockerfile
    container_name: retailhub-postgres
    env_file: .env.prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -q"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: retailhub-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: retailhub-api
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings_prod
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -lc "python manage.py migrate --noinput && \
      python manage.py collectstatic --noinput && \
      gunicorn app.wsgi:application -w 3 -k gthread --threads 8 -b 0.0.0.0:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); rc=s.connect_ex(('127.0.0.1', 8000)); s.close(); sys.exit(0 if rc == 0 else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
      - type: bind
        source: ${REPUESTOS_COSTOS_HOST_DIR:-./repuestos}
        target: /repuestos
        read_only: true
    restart: unless-stopped

  web:
    profiles:
      - dev

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        # In prod we force same-origin (/api) to avoid inheriting dev localhost URL from .env.
        - VITE_API_URL=
        - VITE_SOURCEMAP=${VITE_SOURCEMAP:-1}
        - VITE_SW=${VITE_SW:-0}
    container_name: retailhub-web
    command: ["nginx", "-g", "daemon off;"]
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - staticfiles:/static:ro
    restart: unless-stopped

  webhook_gateway:
    build:
      context: ./web
      dockerfile: Dockerfile.webhook
    container_name: retailhub-webhook-gateway
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  nginx:
    profiles:
      - dev

volumes:
  pg_data:
    # Keep using the existing prod volumes even if we rename the compose project.
    external: true
    name: laschulas_pg_data
  staticfiles:
    external: true
    name: laschulas_staticfiles
  mediafiles:
    external: true
    name: laschulas_mediafiles
