name: sistemadereparaciones

services:
  postgres:
    image: postgres:16
    container_name: sistemadereparaciones-postgres
    env_file: .env.prod
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -q"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: sistemadereparaciones-api
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings_prod
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "python manage.py migrate --noinput && \
      python manage.py collectstatic --noinput && \
      gunicorn app.wsgi:application -w 3 -k gthread --threads 8 -b 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
    restart: unless-stopped

  web:
    profiles:
      - dev

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SOURCEMAP=${VITE_SOURCEMAP:-1}
        - VITE_SW=${VITE_SW:-0}
    container_name: sistemadereparaciones-web
    command: ["nginx", "-g", "daemon off;"]
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - staticfiles:/static:ro
    restart: unless-stopped

  nginx:
    profiles:
      - dev

volumes:
  pg_data:
  staticfiles:
  mediafiles:


