name: equilux-reparaciones-dev

services:
  postgres:
    image: postgres:16
    env_file: ./.env
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build: ./api
    env_file: ./.env
    environment:
      - DB_VENDOR=postgresql
      - POSTGRES_HOST=postgres
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5175}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL:-http://localhost:5175}
      - LOGO_PATH=${LOGO_PATH:-/app/staticfiles/branding/logo-app.png}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18100:8000"
    volumes:
      # Montar sÃ³lo directorio de presupuestos; evitar bind del cÃ³digo en Windows (paths con acentos)
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
      - type: bind
        source: ${REPUESTOS_COSTOS_HOST_DIR:-./repuestos}
        target: /repuestos
        read_only: true
    command: >
      bash -lc "
      python manage.py migrate --noinput &&
      python manage.py apply_repuestos_schema &&
      gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 2
      "

  web:
    build: ./web
    ports:
      - "5175:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_DEV_PROXY_TARGET=${VITE_DEV_PROXY_TARGET:-http://api:8000}
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      api:
        condition: service_started
volumes:
  pg_data:






