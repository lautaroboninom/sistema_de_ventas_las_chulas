# docker compose psversion: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: sepid-mysql
    env_file: ./.env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql:/docker-entrypoint-initdb.d:ro
      - ./mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build: ./api
    container_name: sepid-api
    env_file: .env
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL}
      - LOGO_PATH=/code/service/static/logo.png
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api:/code
      # Monta la carpeta de presupuestos del host en /quotes dentro del contenedor (opcional)
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
    command: >
      bash -lc "
      python manage.py migrate --noinput &&
      gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 2
      "

  web:
    build: ./web
    container_name: sepid-web
    ports:
      - "5173:5173"
    #environment: SE USA PARA DEV EN MAQUIN
      #- VITE_API_URL=http://192.168.50.5:8000
    volumes:
      - ./web:/app
    command: sh -c "npm ci && npm run dev -- --host" 
    depends_on:
      api:
        condition: service_started

  nginx:
    image: nginx:alpine
    depends_on: [api, web]
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
      - ./api/service/static:/static:ro
    restart: unless-stopped

volumes:
  mysql_data:


