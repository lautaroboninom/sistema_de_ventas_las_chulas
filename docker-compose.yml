name: sistemadereparaciones-dev

services:
  postgres:
    image: postgres:16
    env_file: ./.env
    ports:
      - "5433:5433"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build: ./api
    env_file: ./.env
    environment:
      - DB_VENDOR=postgresql
      - POSTGRES_HOST=postgres
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FRONTEND_ORIGIN=http://localhost:5176
      - PUBLIC_WEB_URL=http://localhost:5176
      - LOGO_PATH=${LOGO_PATH:-/app/staticfiles/branding/logo-app.png}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18100:8000"
    volumes:
      # Montar sólo directorio de presupuestos; evitar bind del código en Windows (paths con acentos)
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
    command: >
      bash -lc "
      python manage.py migrate --noinput &&
      gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 2
      "

  web:
    build: ./web
    ports:
      - "5175:5173"
    environment:
      - VITE_API_URL=http://localhost:18110
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      api:
        condition: service_started
volumes:
  pg_data:





