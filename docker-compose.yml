# docker compose psversion: "3.9"

services:
  db:
    image: postgres:16
    container_name: sepid-db
    env_file: ./.env
    ports:
      - "5432:5432"
    volumes:
      # tus scripts .sql van acá (solo se ejecutan si el data dir está vacío)
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: sepid-pgadmin
    env_file: .env
    ports:
      - "5050:80"
    volumes:
      - ./db/pgadmin:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./api
    container_name: sepid-api
    env_file: .env
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - COMPANY_LOGO_PATH=/code/service/static/logo.png
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL}
      - LOGO_PATH=/code/service/static/logo.png
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api:/code
    command: >
      bash -lc "
      python manage.py migrate --noinput &&
      gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 2
      "

  web:
    build: ./web
    container_name: sepid-web
    ports:
      - "5173:5173"
    #environment: SE USA PARA DEV EN MAQUIN
      #- VITE_API_URL=http://192.168.0.34:8000
    volumes:
      - ./web:/app
    command: sh -c "npm ci && npm run build" 
    depends_on:
      api:
        condition: service_started

  nginx:
    image: nginx:alpine
    depends_on: [api, web]
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
      - ./api/static:/static:ro
    restart: unless-stopped