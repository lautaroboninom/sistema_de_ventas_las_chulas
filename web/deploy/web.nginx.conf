server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/nginx/certs/reparacionesequilux.tailc98abd.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/reparacionesequilux.tailc98abd.ts.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # Cache immutable assets
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Django collected static files (mounted at /static)
    location /static/ {
        alias /static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # API proxy to Django
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single Page App routing
    location / {
        try_files $uri /index.html;
    }

    # Reasonable request size for uploads
    client_max_body_size 50m;

    # Basic gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}

